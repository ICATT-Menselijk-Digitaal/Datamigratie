name: Changelog Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changelog-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-changelog:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      CHANGELOG_PATH: docs/changelog/changelog.md
      MARKER: "<!-- changelog-check -->"

    steps:
      - name: Check if changelog was updated
        id: changelog
        run: |
          if gh api --paginate "/repos/$REPO/pulls/$PR/files" --jq '.[].filename' \
               | grep -qxF "$CHANGELOG_PATH"; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find existing review thread
        id: find-thread
        run: |
          THREAD_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      comments(first: 1) {
                        nodes { body }
                      }
                    }
                  }
                }
              }
            }' -f owner="${REPO%/*}" \
               -f repo="${REPO#*/}" \
               -F pr="$PR" \
               --jq ".data.repository.pullRequest.reviewThreads.nodes[] | select(.comments.nodes[0].body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$THREAD_ID" ]; then
            echo "thread-id=$THREAD_ID" >> "$GITHUB_OUTPUT"
            echo "Found existing thread: $THREAD_ID"
          else
            echo "thread-id=" >> "$GITHUB_OUTPUT"
            echo "No existing thread found"
          fi

      - name: Get first changed file
        if: steps.changelog.outputs.updated == 'false' && steps.find-thread.outputs.thread-id == ''
        id: first-file
        run: |
          FILE=$(gh api "/repos/$REPO/pulls/$PR/files?per_page=1" --jq '.[0].filename')
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "First changed file: $FILE"

      - name: Post review comment
        if: steps.changelog.outputs.updated == 'false' && steps.find-thread.outputs.thread-id == ''
        env:
          FIRST_FILE: ${{ steps.first-file.outputs.path }}
          CHANGELOG_URL: ${{ github.server_url }}/${{ github.repository }}/blob/main/docs/changelog/changelog.md
        run: |
          BODY="$MARKER
          ## 📝 Changelog not updated

          This pull request does not include changes to [\`$CHANGELOG_PATH\`]($CHANGELOG_URL).

          Please add an entry to the **Current Version** section of the changelog. The entry should consist of the title of the story and a link to the story in Jira. Usually the link has this format: \`https://dimpact.atlassian.net/browse/DATA-XXX\`."

          jq -n \
            --arg path "$FIRST_FILE" \
            --arg body "$BODY" \
            '{
              event: "COMMENT",
              body: "",
              comments: [{ path: $path, line: 1, side: "RIGHT", body: $body }]
            }' | gh api "/repos/$REPO/pulls/$PR/reviews" \
              --method POST --input -

      - name: Unresolve thread
        if: steps.changelog.outputs.updated == 'false' && steps.find-thread.outputs.thread-id != ''
        env:
          THREAD_ID: ${{ steps.find-thread.outputs.thread-id }}
        run: |
          gh api graphql -f query='
            mutation($id: ID!) {
              unresolveReviewThread(input: { threadId: $id }) {
                thread { isResolved }
              }
            }' -f id="$THREAD_ID"

      - name: Resolve thread
        if: steps.changelog.outputs.updated == 'true' && steps.find-thread.outputs.thread-id != ''
        env:
          THREAD_ID: ${{ steps.find-thread.outputs.thread-id }}
        run: |
          gh api graphql -f query='
            mutation($id: ID!) {
              resolveReviewThread(input: { threadId: $id }) {
                thread { isResolved }
              }
            }' -f id="$THREAD_ID"
